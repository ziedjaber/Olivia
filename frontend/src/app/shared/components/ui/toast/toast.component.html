<div class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 pointer-events-none w-80 max-w-[calc(100vw-3rem)]">
  <div *ngFor="let toast of toasts" 
       class="pointer-events-auto flex items-start gap-3 p-4 rounded-2xl shadow-xl animate-in slide-in-from-right-8 fade-in duration-300 transform transition-all group"
       [ngClass]="{
         'bg-secondary text-white border border-secondary-container': toast.type === 'success',
         'bg-error text-white border border-error/50': toast.type === 'error',
         'bg-surface-container-high text-on-surface border border-outline-variant/20': toast.type === 'info'
       }">
       
    <span class="material-symbols-outlined shrink-0 mt-0.5"
       [ngClass]="{
         'text-white': toast.type !== 'info',
         'text-primary': toast.type === 'info'
       }">
      {{ toast.type === 'success' ? 'check_circle' : toast.type === 'error' ? 'error' : 'info' }}
    </span>
    
    <div class="flex-grow">
      <p class="text-sm font-medium leading-tight">
        {{ toast.message }}
      </p>
    </div>
    
    <button (click)="toastService.remove(toast.id)" 
            class="shrink-0 rounded-full w-6 h-6 flex items-center justify-center opacity-70 hover:opacity-100 hover:bg-black/10 transition-colors">
      <span class="material-symbols-outlined text-[16px]">close</span>
    </button>
  </div>
</div>
